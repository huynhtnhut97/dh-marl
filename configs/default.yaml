# Default DH-MARL configuration.
#
# Matches Table 1 of the paper unless indicated. Sub-sections mirror the dataclass
# tree in dh_marl/train/trainer.py: TrainerConfig -> PPOConfig, EnvConfig, CriticConfig,
# ChannelConfig, and (optional) PolicyConfig / MessageEncoderConfig.

total_episodes: 20000
steps_per_rollout: 256
workers: 4
n_train: 8
swarm_size_jitter: false
lr_policy: 0.0005
lr_critic: 0.001
lr_message: 0.0005
device: cpu
seed: 0
out_dir: runs/dhmarl
eval_every: 200
checkpoint_every: 500
task_schedule: random

ppo:
  clip_eps: 0.2
  n_epochs: 4
  minibatch_size: 128
  gamma: 0.99
  lam: 0.95
  value_coef: 0.5
  entropy_coef: 0.01
  risk_bce_coef: 0.1
  message_bottleneck_coef: 0.0001
  grad_clip: 0.5
  use_fcb: true
  use_dc: true
  use_him_edges: true

env:
  task_name: MSDD
  n_agents: 8
  dt: 0.02
  actuation_speed: 0.0001
  d_msg: 16
  n_ray_channels: 20
  seed: 0
  max_steps: 1000
  him:
    alpha_w: 0.30
    alpha_t: 0.20
    alpha_l: 1.50
    xi_w: 5.0
    xi_t: 3.0
    xi_l: 1.2
    body_diameter: 5.0e-5
    edge_threshold: 0.05
  coeffs:
    alpha_d: 1.0
    beta_w: 0.5
    d_safe: 1.5
    xi_w_safe: 1.0
    beta_c: 1.0
    d_contact: 1.0
    eta: 0.01
    R_team: 50.0
    R_fail: 20.0
    T_max: 1000
    r_dep: 5.0
    rho_tol: 1.5
    T_hold: 20
    r_occ: 0.2
    n_min: 3
    T_contig: 30
    r_visit: 3.0
    r_tx: 5.0
    r_jam: 0.2
    n_jam: 4
    N_wall_max: 10
  scene: default

critic:
  obs_embed_dim: 128
  action_dim: 10
  action_embed_dim: 128
  node_dim: 128
  gat_hidden: 128
  gat_heads: 4
  value_head_hidden: 128

channel:
  d_msg: 16
  xi_d: 4.0
  delay_per_bd: 1.0
  delay_max: 8
  noise_sigma: 0.05

ablation:
  use_fcb: true
  use_dc: true
  use_him_edges: true
